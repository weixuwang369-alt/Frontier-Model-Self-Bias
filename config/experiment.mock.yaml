# experiment.mock.yaml - a tiny, all-mock run for Phase 0 end-to-end verification.
# Every slot uses the mock provider (free, deterministic, offline). This is the config
# used to prove the pipeline runs end-to-end with no real API calls and $0 spend.

run:
  name: mock-smoke
  seed: 20260716
  budget_usd: 10.00
  phase: 0

roster:                        # distinct mock-* model strings - all free, all offline
  - { slot: anthropic_frontier, provider: mock, model: mock-anthropic-frontier, family: anthropic }
  - { slot: anthropic_small,    provider: mock, model: mock-anthropic-small,    family: anthropic }
  - { slot: google_frontier,    provider: mock, model: mock-google-frontier,    family: google }
  - { slot: google_small,       provider: mock, model: mock-google-small,       family: google }
  - { slot: openai_frontier,    provider: mock, model: mock-openai-frontier,    family: openai }
  - { slot: openai_small,       provider: mock, model: mock-openai-small,       family: openai }

domains:
  - name: verifiable_if
    n_prompts: 2
    reference: programmatic
  - name: creative_writing
    n_prompts: 2
    reference: ensemble
    rubrics: { source: llm_drafted_human_reviewed, per_task_min: 4, per_task_max: 4 }

lengths:
  target_bins_tokens: [50, 100]
  tolerance_pct: 20
  max_retries: 3
  truncation_series: true

generation:
  temperature: 0.7
  persist_raw: true

judging:
  paradigms: [pwc, rubric]
  disclosure_arms: [anonymous]
  order_swap_pwc: true
  temperature: 0.0
  elicit_confidence: true
  judge_isolation: true

probes:
  pairwise_recognition: true
  single_recognition: false
  on_truncation_series: true

diagnostics:
  repeatability_sample_pct: 2
  repeatability_n: 5

analysis:
  bootstrap_iterations: 1000
  attribution_baseline: tfidf
  mixed_effects: true

fingerprint:
  enabled: false
