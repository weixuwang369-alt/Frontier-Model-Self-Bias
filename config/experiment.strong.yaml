# experiment.strong.yaml - a properly-powered pilot on real cloud models, under $5.
#
# vs the smoke run: 3 models (with a same-family OpenAI pair so the family-bias metric
# and the regression's family term populate), 4 length bins for onset resolution, and
# only genuinely-distinct built-in prompts (no "(variant N)" clones that fake power).
#
#   uv run selfbias check    config/experiment.strong.yaml
#   uv run selfbias estimate config/experiment.strong.yaml
#   uv run selfbias run      config/experiment.strong.yaml
#   uv run selfbias analyze  config/experiment.strong.yaml   # (dashboard does this too)

run:
  name: strong-pilot
  seed: 20260720
  budget_usd: 5.00            # hard cap: the run halts (resumably) before crossing it
  phase: 1

roster:                        # 3 models; luna + gpt-5-mini share family "openai"
  - { slot: luna,  provider: openai,    model: "gpt-5.6-luna",
      family: openai,    api_key_env: OPENAI_API_KEY }
  - { slot: mini,  provider: openai,    model: "gpt-5-mini",
      family: openai,    api_key_env: OPENAI_API_KEY }
  - { slot: haiku, provider: anthropic, model: "claude-haiku-4-5",
      family: anthropic, api_key_env: ANTHROPIC_API_KEY }

domains:                       # n_prompts capped at the 10-distinct built-in pool
  - name: creative_writing     # primary subjective RQ2 domain
    n_prompts: 8
    reference: ensemble
    rubrics: { source: llm_drafted_human_reviewed, per_task_min: 4, per_task_max: 6 }
  - name: open_qa_summarization
    n_prompts: 8
    reference: ensemble
    rubrics: { source: llm_drafted_human_reviewed, per_task_min: 4, per_task_max: 6 }
  - name: verifiable_if        # objective arm; each prompt has a matching checker
    n_prompts: 8
    reference: programmatic

lengths:
  target_bins_tokens: [50, 100, 250, 500]
  tolerance_pct: 20
  max_retries: 3
  truncation_series: true

generation:
  temperature: 0.7
  persist_raw: true

judging:
  paradigms: [pwc, rubric]
  disclosure_arms: [anonymous]
  order_swap_pwc: true
  temperature: 0.0
  elicit_confidence: true
  judge_isolation: true

probes:
  pairwise_recognition: true
  single_recognition: false
  on_truncation_series: true

diagnostics:
  repeatability_sample_pct: 2
  repeatability_n: 5

analysis:
  bootstrap_iterations: 1000
  attribution_baseline: tfidf
  mixed_effects: true

fingerprint:
  enabled: false
