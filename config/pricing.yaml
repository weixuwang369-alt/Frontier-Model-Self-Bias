# pricing.yaml - per-model API pricing in USD per million tokens (input / output).
# User-updatable; the cost estimator and live accounting read ONLY from this file.
# Prices change frequently - keep this current before running a real sweep.
# Keyed by model string exactly as it appears in the experiment config `roster`.
#
# `default` is used when a model string is not found here (with a loud warning at
# estimate time so it is never silently wrong).

default:
  input_per_mtok: 5.00
  output_per_mtok: 15.00

models:
  # Anthropic
  claude-opus-4-8:
    input_per_mtok: 15.00
    output_per_mtok: 75.00
  claude-haiku-4-5-20251001:
    input_per_mtok: 1.00
    output_per_mtok: 5.00

  # Google
  gemini-2.5-pro:
    input_per_mtok: 1.25
    output_per_mtok: 10.00
  gemini-2.5-flash:
    input_per_mtok: 0.30
    output_per_mtok: 2.50

  # OpenAI
  gpt-5:
    input_per_mtok: 1.25
    output_per_mtok: 10.00
  gpt-5-mini:
    input_per_mtok: 0.25
    output_per_mtok: 2.00

  # Local open models via Ollama/vLLM - free to run locally.
  "qwen2.5:7b":
    input_per_mtok: 0.00
    output_per_mtok: 0.00
  "llama3.1:8b":
    input_per_mtok: 0.00
    output_per_mtok: 0.00

  # Mock provider - free; used in Phase 0 and tests so estimates/accounting stay $0.
  # (Any model string starting with "mock" is treated as free automatically.)
  mock-model:
    input_per_mtok: 0.00
    output_per_mtok: 0.00
