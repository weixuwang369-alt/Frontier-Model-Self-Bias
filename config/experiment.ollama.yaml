# experiment.ollama.yaml - run entirely on local open models via Ollama (no cloud keys).
#
# Prereqs: install Ollama (https://ollama.com), then pull the models:
#   ollama pull qwen2.5:7b
#   ollama pull llama3.1:8b
# Ollama serves an OpenAI-compatible API at http://localhost:11434/v1 (no key needed).
#
#   uv run selfbias check    config/experiment.ollama.yaml   # confirm the server is up
#   uv run selfbias estimate config/experiment.ollama.yaml
#   uv run selfbias run      config/experiment.ollama.yaml

run:
  name: ollama-local
  seed: 20260717
  budget_usd: 1.00            # local models are priced $0, so this cap is never hit
  phase: 1

roster:                        # any N >= 2 models; here two local open models
  - { slot: qwen,  provider: openai_compatible, model: "qwen2.5:7b",  family: qwen,
      base_url: "http://localhost:11434/v1", api_key_env: OLLAMA_KEY }
  - { slot: llama, provider: openai_compatible, model: "llama3.1:8b", family: llama,
      base_url: "http://localhost:11434/v1", api_key_env: OLLAMA_KEY }

domains:
  - name: creative_writing
    n_prompts: 5
    reference: ensemble
    rubrics: { source: llm_drafted_human_reviewed, per_task_min: 4, per_task_max: 6 }
  - name: verifiable_if
    n_prompts: 5
    reference: programmatic

lengths:
  target_bins_tokens: [100, 500]
  tolerance_pct: 20
  max_retries: 3
  truncation_series: true

generation:
  temperature: 0.7
  persist_raw: true

judging:
  paradigms: [pwc, rubric]
  disclosure_arms: [anonymous]
  order_swap_pwc: true
  temperature: 0.0
  elicit_confidence: true
  judge_isolation: true

probes:
  pairwise_recognition: true
  single_recognition: false
  on_truncation_series: true

diagnostics:
  repeatability_sample_pct: 2
  repeatability_n: 5

analysis:
  bootstrap_iterations: 1000
  attribution_baseline: tfidf
  mixed_effects: true

fingerprint:
  enabled: false

# To bring your own prompts instead of the built-in set, run `selfbias template
# prompts.xlsx`, fill it in, and add:
#   prompts:
#     source: excel
#     excel_path: prompts.xlsx
